# Bloque de referencia para servir la guía en https://38-242-236-14.nip.io/qa/
# Se inserta DENTRO del server block SSL existente (sites-enabled/clara),
# antes del "location / { proxy_pass ... }" final.
#
# La guía se sirve como estático desde un clon de este repo en /var/www/qa.

location /qa/ {
    alias /var/www/qa/;
    index index.html;
    try_files $uri $uri/ =404;
    charset utf-8;
    add_header X-Served-By "nginx-static-qa";
}

# /qa sin barra -> /qa/
location = /qa {
    return 301 /qa/;
}

# No exponer el .git del clon
location ~ ^/qa/\.git { deny all; return 404; }
